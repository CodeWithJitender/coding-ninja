<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="user-container1"></div>
    <div class="user-container2"></div>
    <div class="user-container3"></div>
    <script>
      function fetchUser(id) {
        const user = fetch(`https://dummyjson.com/users/${id}`)
          .then((response) => {
            if(!response.ok) {
              throw new Error('Network response was not ok');
            }
            return response.json();
          })
          .then((data) => {
            console.log(data);
            document.querySelector('.user-container1').innerHTML = 
            `<div class="user-card"><h2>${data.firstName} ${data.lastName}</h2> <p>Email: ${data.email}</p><p>Phone: ${data.phone}</p></div>`;
             document.querySelector('.user-container2').innerHTML = 
            `<div class="user-card"><h2>${data.firstName} ${data.lastName}</h2> <p>Email: ${data.email}</p><p>Phone: ${data.phone}</p></div>`;
             document.querySelector('.user-container3').innerHTML = 
            `<div class="user-card"><h2>${data.firstName} ${data.lastName}</h2> <p>Email: ${data.email}</p><p>Phone: ${data.phone}</p></div>`;
          })
          .catch((error) => {
            console.error(error);
          });
      }
      fetchUser(6);
    </script>
  </body>
</html>
