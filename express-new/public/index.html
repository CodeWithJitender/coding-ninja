<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 40px auto;
            max-width: 600px;
            padding: 0 10px;
            color: #333;
            background-color: #f9f9f9;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn {
            display: inline-block;
            background: #007BFF;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Success!</h1>
        <p>This is a simple, static HTML file running locally or on your server. It includes some basic inline CSS styling to keep things looking clean.</p>
        
        <hr>
        
        <h3>Test Elements:</h3>
        <ul>
            <li>Unordered list item A</li>
            <li>Unordered list item B</li>
        </ul>

        <a href="#" class="btn" onclick="alert('JavaScript is working!'); return false;">Click to Test JS</a>
    </div>

</body>
</html>
